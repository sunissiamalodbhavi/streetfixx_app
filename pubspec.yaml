name: streetfixx_app
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # 🌐 API calls (Flask backend communication)
  http: ^1.2.2

  # 🗺️ Google Maps
  google_maps_flutter: ^2.6.1

  # 📍 Current Location (GPS)
  geolocator: ^10.1.0
  geocoding: ^3.0.0

  # 📸 Camera / Gallery image picker
  image_picker: ^1.0.7

  # 📱 Device info
  device_info_plus: ^10.1.2

  # 🔥 Firebase
  firebase_core: ^2.25.4
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.1.2
  url_launcher: ^6.3.1
  connectivity_plus: ^6.0.3
  fl_chart: 0.69.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/images/camlogo.jpg"

flutter:
  uses-material-design: true

  assets:
    - lib/assets/images/camlogo.jpg